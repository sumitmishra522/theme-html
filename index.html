<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>

    <style>
        .main {
            background-image: url(gfgfg.jpg);
            width: 100%;
            height: 100vh;

        .main h1 {
            color: white;

            top: 100px;

        }

        .btn-group {

        #btn2 {

            color: white;
            width: 150px;
            height: 50px;
            border-radius: 50px;
            border: 2px solid white;
            font-weight: bold;
            font-size: 18px;
        }

        #btn1:hover{
            background-color: #d9961b;
            color: white;
            cursor: pointer;
        }
        #btn2:hover{
            background-color: white;
            color:black;
        }

        .main-box{
            display: flex;
            justify-content: center;
            position: relative;
            top: 130px;
            gap: 30px;
        }

        .box1{
            width: 200px;
            height: 200px;
            background-color: white;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            

        }

        .box1 > h2 {
            color: black;
            font-size: 30px;
            text-align: center;
            align-content: center;
        }

        

    </style>

</head>

</p>

<div class="btn-group">

</div>

<div class="main-box">
